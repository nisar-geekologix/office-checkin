name: Office Clock In / Clock Out

on:
  schedule:
    - cron: '10 4 * * 1-5'   # IST 9:40 AM (Mon-Fri)
    - cron: '9 13 * * 1-5'   # IST 6:39 PM (Mon-Fri) - TEST

  workflow_dispatch:
    inputs:
      action:
        description: 'clockin ya clockout'
        required: true
        default: 'clockin'
        type: choice
        options:
          - clockin
          - clockout

jobs:
  attendance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ACTION=${{ github.event.inputs.action }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +"%H")
            if [ "$HOUR" = "04" ]; then
              echo "ACTION=clockin" >> $GITHUB_ENV
            else
              echo "ACTION=clockout" >> $GITHUB_ENV
            fi
          fi

      - name: Run
        env:
          OFFICE_USERNAME: ${{ secrets.OFFICE_USERNAME }}
          OFFICE_PASSWORD: ${{ secrets.OFFICE_PASSWORD }}
        run: python checkin.py
